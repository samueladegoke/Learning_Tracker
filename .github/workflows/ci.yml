name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  convex-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Root Dependencies
        run: npm ci

      - name: Validate Core Docs
        run: npm run check:docs

      - name: Run Convex Tests
        run: npm run test:convex

  frontend-quality:
    runs-on: ubuntu-latest
    needs: convex-tests
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

      - name: Dead Code Check
        run: npm run check:dead-code

      - name: Run Unit & Component Tests
        run: npm test

      - name: Build Frontend
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-quality
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test:e2e -- --reporter=line
